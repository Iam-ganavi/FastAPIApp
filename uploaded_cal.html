<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f0f5;
        }
        .calculator {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Calculator</h1>
        <input type="number" id="num1" placeholder="Enter a number">
        <input type="number" id="num2" placeholder="Second number (if required)">
        <button onclick="calculate('sum')">Sum</button>
        <button onclick="calculate('product')">Product</button>
        <button onclick="calculate('difference')">Difference</button>
        <button onclick="calculate('quotient')">Quotient</button>
        <button onclick="calculate('power')">Power</button>
        <button onclick="calculate('square')">Square</button>
        <button onclick="calculate('square-root')">Square Root</button>
        <div class="result" id="result">Result: </div>
    </div>

    <script>
        function calculate(operation) {
            const num1 = parseFloat(document.getElementById('num1').value) || 0;
            const num2 = parseFloat(document.getElementById('num2').value) || 0;
            let result;

            switch (operation) {
                case 'sum':
                    result = num1 + num2;
                    break;
                case 'product':
                    result = num1 * num2;
                    break;
                case 'difference':
                    result = num1 - num2;
                    break;
                case 'quotient':
                    result = num2 !== 0 ? num1 / num2 : 'Cannot divide by zero';
                    break;
                case 'power':
                    result = num2 ? Math.pow(num1, num2) : 'Enter a valid exponent';
                    break;
                case 'square':
                    result = Math.pow(num1, 2);
                    break;
                case 'square-root':
                    result = num1 >= 0 ? Math.sqrt(num1) : 'Cannot calculate square root of a negative number';
                    break;
                default:
                    result = 'Invalid operation';
            }

            document.getElementById('result').innerText = `Result: ${result}`;
        }
    </script>
</body>
</html>
